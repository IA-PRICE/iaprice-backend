spring:
  application:
    name: iaprice-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.scfofarcqvtjhvwsgwcm}
    password: ${SPRING_DATASOURCE_PASSWORD:WPMxWO2qsDP96pDS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway gère le schéma, JPA valide uniquement
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

server:
  port: 8080

# ── JWT ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:CHANGE_ME_MIN_32_CHARS_SECRET_KEY_HERE}  # à remplacer par une vraie clé en prod
  expiration: ${JWT_EXPIRATION:86400}                           # 24h en secondes

# ── Logging ──────────────────────────────────────
logging:
  level:
    ma.iaprice: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO


cors:
  allowed-origins: http://localhost:4200,http://app.144.91.85.247.sslip.io

